[build]
target = "./index.html"
# Relative asset URLs so CSS/JS load correctly in Tauri webview
public_url = "./"
minify = "on_release"

[watch]
ignore = [
  "../app-tauri",
  "../target",
  "../core",
  "../cli",
  "../types",
  # Written by build.rs during wasm compile — watching it causes infinite rebuilds.
  "public/posthog-config.js",
]

[tools]
# Must match a version Trunk can download; processes style/tailwind.css via rel="tailwind-css"
tailwindcss = "4.3.3"

[serve]
port = 1420
open = false
