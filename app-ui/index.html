<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CDXTheme</title>
  <link rel="icon" type="image/png" href="public/logo.png" />
  <link rel="apple-touch-icon" href="public/logo.png" />
  <link data-trunk rel="tailwind-css" href="style/tailwind.css" />
  <link data-trunk rel="copy-dir" href="public" />
  <!-- Rust 1.87+ emits bulk-memory / nontrapping-fptoint by default; wasm-opt must allow them. -->
  <link data-trunk rel="rust" data-wasm-opt="z"
    data-wasm-opt-params="--enable-bulk-memory --enable-bulk-memory-opt --enable-nontrapping-float-to-int" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem("ctl-theme");
        var dark = t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      } catch (_) {}

      // Desktop-app feel: no native context menu, no accidental text selection.
      document.addEventListener("contextmenu", function (e) {
        var tag = (e.target && e.target.tagName) || "";
        if (tag === "INPUT" || tag === "TEXTAREA") return;
        e.preventDefault();
      });
      document.addEventListener("dragstart", function (e) {
        if (e.target && e.target.tagName === "IMG") e.preventDefault();
      });
    })();
  </script>
  <!-- Defaults if posthog-config.js is missing (pre-build); build overwrites via that file. -->
  <script>
    window.__CDX_POSTHOG__ = window.__CDX_POSTHOG__ || {
      key: "",
      host: "https://us.i.posthog.com",
    };
  </script>
  <!-- Build-time PostHog credentials (generated by app-ui/build.rs from POSTHOG_*). -->
  <script src="public/posthog-config.js"></script>
  <!-- PostHog web SDK: key injected at build; capture is opt-in (Settings). -->
  <script>
    (function () {
      var cfg = window.__CDX_POSTHOG__ || {};
      var apiKey = (cfg.key || "").trim();
      var apiHost = (cfg.host || "https://us.i.posthog.com").trim();

      // Manual SPA page session (desktop shell has no real URL navigation).
      var currentPage = null;
      var lastPage = null;
      var pageEnteredAt = null;

      function pageSlug(page) {
        return String(page || "app").replace(/^\/+/, "") || "app";
      }

      function pageProps(page) {
        var slug = pageSlug(page);
        return {
          $current_url: "cdxtheme://" + slug,
          $pathname: "/" + slug,
          $host: "cdxtheme",
          page: slug,
        };
      }

      function canCapture() {
        if (!window.posthog || !apiKey) return false;
        if (
          typeof posthog.has_opted_out_capturing === "function" &&
          posthog.has_opted_out_capturing()
        ) {
          return false;
        }
        return true;
      }

      window.__cdxPosthog = {
        configured: !!apiKey,
        setEnabled: function (enabled) {
          try {
            if (!window.posthog || !apiKey) return;
            if (enabled) {
              posthog.opt_in_capturing();
            } else {
              // Leave current page before opt-out so the final $pageleave is sent.
              this.capturePageleave();
              posthog.opt_out_capturing();
              currentPage = null;
              pageEnteredAt = null;
            }
          } catch (_) {}
        },
        identify: function (distinctId) {
          try {
            if (!window.posthog || !apiKey || !distinctId) return;
            posthog.identify(String(distinctId));
          } catch (_) {}
        },
        capture: function (event, props) {
          try {
            if (!canCapture()) return;
            posthog.capture(event, props || {});
          } catch (_) {}
        },
        // Standard PostHog $pageleave (time on previous route).
        capturePageleave: function (page) {
          try {
            if (!canCapture()) return;
            var slug = page != null ? pageSlug(page) : currentPage;
            if (!slug) return;
            var props = pageProps(slug);
            if (pageEnteredAt != null && (!page || pageSlug(page) === currentPage)) {
              props.$prev_pageview_duration = Math.max(
                0,
                (Date.now() - pageEnteredAt) / 1000
              );
            }
            posthog.capture("$pageleave", props);
            if (!page || pageSlug(page) === currentPage) {
              currentPage = null;
              pageEnteredAt = null;
            }
          } catch (_) {}
        },
        // Standard PostHog $pageview (install check + product analytics).
        // Automatically emits $pageleave for the previous page when navigating.
        capturePageview: function (page) {
          try {
            if (!canCapture()) return;
            var slug = pageSlug(page);
            if (currentPage && currentPage !== slug) {
              this.capturePageleave(currentPage);
            } else if (currentPage === slug) {
              // Same page re-fire: still leave+view so duration resets cleanly.
              this.capturePageleave(currentPage);
            }
            posthog.capture("$pageview", pageProps(slug));
            currentPage = slug;
            lastPage = slug;
            pageEnteredAt = Date.now();
          } catch (_) {}
        },
      };

      // App hide / quit: $pageleave. On show again: resume with a fresh $pageview.
      function leaveOnHide() {
        try {
          if (window.__cdxPosthog) window.__cdxPosthog.capturePageleave();
        } catch (_) {}
      }
      function resumeOnShow() {
        try {
          if (!window.__cdxPosthog || currentPage || !lastPage) return;
          window.__cdxPosthog.capturePageview(lastPage);
        } catch (_) {}
      }
      window.addEventListener("pagehide", leaveOnHide);
      window.addEventListener("beforeunload", leaveOnHide);
      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "hidden") leaveOnHide();
        else if (document.visibilityState === "visible") resumeOnShow();
      });

      if (!apiKey) {
        // Build without POSTHOG_API_KEY — web analytics stays a no-op.
        return;
      }

      !(function (t, e) {
        var o, n, p, r;
        e.__SV ||
          ((window.posthog = e),
          (e._i = []),
          (e.init = function (i, s, a) {
            function g(t, e) {
              var o = e.split(".");
              2 == o.length && ((t = t[o[0]]), (e = o[1])),
                (t[e] = function () {
                  t.push([e].concat(Array.prototype.slice.call(arguments, 0)));
                });
            }
            ((p = t.createElement("script")).type = "text/javascript"),
              (p.crossOrigin = "anonymous"),
              (p.async = !0),
              (p.src =
                s.api_host.replace(".i.posthog.com", "-assets.i.posthog.com") +
                "/static/array.js"),
              (r = t.getElementsByTagName("script")[0]).parentNode.insertBefore(p, r);
            var u = e;
            for (
              void 0 !== a ? (u = e[a] = []) : (a = "posthog"),
                u.people = u.people || [],
                u.toString = function (t) {
                  var e = "posthog";
                  return ("posthog" !== a && (e += "." + a), t || (e += " (stub)"), e);
                },
                u.people.toString = function () {
                  return u.toString(1) + ".people (stub)";
                },
                o =
                  "init capture register register_once register_for_session unregister unregister_for_session getFeatureFlag getFeatureFlagResult isFeatureEnabled reloadFeatureFlags updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures on onFeatureFlags onSessionId getSurveys getActiveMatchingSurveys renderSurvey canRenderSurvey getNextSurveyStep identify setPersonProperties group resetGroups setPersonPropertiesForFlags resetPersonPropertiesForFlags setGroupPropertiesForFlags resetGroupPropertiesForFlags reset get_distinct_id getGroups get_session_id get_session_replay_url alias set_config startSessionRecording stopSessionRecording sessionRecordingStarted captureException loadToolbar get_property getSessionProperty createPersonProfile opt_in_capturing opt_out_capturing has_opted_in_capturing has_opted_out_capturing clear_opt_in_out_capturing debug".split(
                    " ",
                  ),
                n = 0;
              n < o.length;
              n++
            )
              g(u, o[n]);
            e._i.push([i, s, a]);
          }),
          (e.__SV = 1));
      })(document, window.posthog || []);

      posthog.init(apiKey, {
        api_host: apiHost,
        defaults: "2026-05-30",
        // Settings opt-in (default off). Enable Usage analytics to send events.
        opt_out_capturing_by_default: true,
        // Desktop shell has no real URL navigation — we send `$pageview` / `$pageleave` manually.
        capture_pageview: false,
        capture_pageleave: false,
        persistence: "localStorage+cookie",
        // Allow anonymous `$pageview` so the install check / funnel works before identify.
        person_profiles: "always",
      });
    })();
  </script>
</head>

<body class="select-none"></body>

</html>
